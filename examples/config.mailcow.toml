# Mailcow host config (e.g. mees-mail-server, albury-mail-server).
# Reads container logs from the mailcow docker-compose stack via
# `docker logs --since` (mailcow uses the default json-file log driver).
# Bans via the mailcow REST API. Runs *alongside* mailcow's built-in
# fail2ban — that handles threshold-based bans; we add slow / distributed
# / multi-vector cases.
#
# Confirm exact container names on the host:
#   docker ps --format '{{.Names}}' | grep mailcowdockerized

host_role = "mailcow"
mode = "warn"   # start in warn for ~24h, then flip to enforce

[[sources]]
type = "mailcow_docker"
flavour = "postfix"
container = "mailcowdockerized-postfix-mailcow-1"

[[sources]]
type = "mailcow_docker"
flavour = "dovecot"
container = "mailcowdockerized-dovecot-mailcow-1"

[[sources]]
type = "mailcow_nginx"
container = "mailcowdockerized-nginx-mailcow-1"

[action]
type = "mailcow_api"
url_env = "MAILCOW_API_URL"
key_env = "MAILCOW_API_KEY"
# Set false when MAILCOW_API_URL is https://127.0.0.1 (the cert is for the
# public hostname, not the loopback). Mailcow's UI lockdown often forces
# the loopback path.
tls_verify = false

[[providers]]
type = "anthropic"
model = "claude-haiku-4-5-20251001"
timeout_seconds = 60

[[providers]]
type = "ollama_native"
url_env = "QWEN_URL"
token_env = "QWEN_TOKEN"
model = "qwen3.6:35b-a3b"
think = false
timeout_seconds = 90
tls_verify = false

[limits]
max_bans_per_run = 10
max_batch_size = 200

[digest]
enabled = true
email = "stu@mees.st"
sender = "claude-fail2ban@HOSTNAME"

[paths]
state_file = "/var/lib/claude-fail2ban/state.json"
digest_file = "/var/lib/claude-fail2ban/daily-digest.json"
whitelist_file = "/etc/claude-fail2ban/whitelist.txt"

[shadow]
enabled = true
provider_index = 1
